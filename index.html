<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini HTML Project</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f4f4;margin:0}
.card{background:white;padding:24px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center;width:320px}
button{padding:10px 16px;border:none;border-radius:10px;background:#111;color:#fff;cursor:pointer}
#clock{font-size:2rem;margin:12px 0}
</style>
</head>
<body>
<div class="card">
<h2>Digital Clock</h2>
<div id="clock">00:00:00</div>
<button onclick="alert('Thanks for trying this project!')">Click Me</button>
</div>
<script>
function updateClock(){
 const now=new Date();
 document.getElementById('clock').textContent=now.toLocaleTimeString();
}
setInterval(updateClock,1000);updateClock();
</script>
</body>
</html>
